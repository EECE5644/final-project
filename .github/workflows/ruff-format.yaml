name: Auto Format with Ruff

on:
  push:
    branches:
      - "**"
    paths:
      - "**.py"
      - "**.ipynb"
      - "pyproject.toml"

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install ruff
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "--version"

      - name: Run ruff format
        run: ruff format --check .

      - name: Run ruff check
        run: ruff check .
